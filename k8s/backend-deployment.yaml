apiVersion: apps/v1
kind: Deployment
metadata:
  name: quipay-backend
  labels:
    app: quipay-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quipay-backend
  template:
    metadata:
      labels:
        app: quipay-backend
    spec:
      containers:
        - name: backend
          image: quipay-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: quipay-backend
  labels:
    app: quipay-backend
spec:
  selector:
    app: quipay-backend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
